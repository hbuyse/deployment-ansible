---
- name: "Hyprland Window Manager | Installation"
  hosts: localhost
  pre_tasks:
    - name: "Hyprland | Prepare installation"
      ansible.builtin.include_tasks:
        file: pre_tasks/main.yml
        apply:
          tags: always
      tags: always
  post_tasks:
    - name: "Hyprland | Finalize installation"
      ansible.builtin.include_tasks:
        file: post_tasks/main.yml
        apply:
          tags: always
      tags: always
  roles:
    # Terminals
    - role: "foot"
    - role: "alacritty"
    - role: "ghostty"

    # Hyprland
    - role: "hyprland"
    - role: "wayland_sessions"
    - role: "wallpapers"
    - role: "themes"
    # Tools for sway
    - role: "brightnessctl"
    # Wayland tools
    - role: "waybar"
    - role: "kanshi"
    - role: "swaync"
    - role: "wofi"
      when: ansible_facts.os_family in ["Debian"]
    - role: "fuzzel"
      when: ansible_facts.os_family not in ["Debian"]
    - role: "wlprop"
    # Portal to select which screen to cast
    - role: "xdg_desktop_portal"
    - role: "wireplumber"
    - role: "tuned"
