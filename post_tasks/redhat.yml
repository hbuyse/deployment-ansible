---
- name: "Post-tasks | Update distro [{{ ansible_facts['os_family'] }}]"
  become: true
  block:
    - name: "Post-tasks | Upgrade packages to latest version [{{ ansible_facts['os_family'] }}]"
      ansible.builtin.dnf:
        name: "*"
        state: latest
        update_cache: true

    - name: "Post-tasks | Clean cache of downloaded packages [{{ ansible_facts['os_family'] }}]"
      ansible.builtin.shell:
        cmd: "dnf clean all"
