---
- name: "Sway | Installation"
  hosts: localhost
  pre_tasks:
    - name: "Sway | Prepare installation"
      ansible.builtin.include_tasks:
        file: pre_tasks/main.yml
        apply:
          tags: always
      tags: always
  post_tasks:
    - name: "Sway | Finalize installation"
      ansible.builtin.include_tasks:
        file: post_tasks/main.yml
        apply:
          tags: always
      tags: always
  roles:
    - role: "greetd"
      when: ansible_hostname != "hbuyse-latitude5400"
    - role: "tuigreet"
      when: ansible_hostname != "hbuyse-latitude5400"
    - role: "alacritty"
    - role: "zsh"
    - role: "oh_my_posh"
    - role: "fastfetch"
    - role: "tmux"
    - role: "fzf"
    - role: "nerdfonts"
    - role: "wallpapers"
    - role: "brightnessctl"
    - role: "wayland_sessions"
    - role: "swaylock"
    - role: "swayidle"
    - role: "sway"
    - role: "waybar"
    - role: "kanshi"
    - role: "mako"
    - role: "wofi"
    - role: "fuzzel"
    - role: "wireplumber"
    - role: "tuned"
    - role: "wlprop"
