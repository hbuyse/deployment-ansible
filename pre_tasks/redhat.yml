---
- name: "RPM Fusion | Import GPG keys"
  become: true
  ansible.builtin.rpm_key:
    key: "https://rpmfusion.org/keys?action=AttachFile&do=get&target=RPM-GPG-KEY-rpmfusion-{{ repo }}-{{ ansible_facts.distribution
      | lower }}-2020"
    state: present
  loop:
    - "free"
    - "nonfree"
  loop_control:
    loop_var: repo
  tags: rpmfusion

- name: "RPM Fusion | Install repo package"
  become: true
  ansible.builtin.dnf:
    name: "https://mirrors.rpmfusion.org/{{ repo }}/{{ ansible_facts.distribution | lower }}/rpmfusion-{{ repo }}-release-{{
      ansible_facts.distribution_major_version }}.noarch.rpm"
    state: present
  loop:
    - "free"
    - "nonfree"
  loop_control:
    loop_var: repo
  tags: rpmfusion
