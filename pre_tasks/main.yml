---
- name: "Pre-tasks | Define alternative architecture naming [Common]"
  ansible.builtin.set_fact:
    alt_arch: "{{ ansible_facts.machine | replace('x86_64', 'amd64') | replace('aarch64', 'arm64') }}"
  tags: always

- name: "Pre-tasks | Get list of services"
  ansible.builtin.service_facts:

- name: "Pre-tasks | Run some OS specific tasks [{{ ansible_facts.os_family }}]"
  ansible.builtin.include_tasks:
    file: "{{ item }}"
    apply:
      tags: always
  with_first_found:
    - files:
        - "{{ ansible_facts.os_family | lower }}.yml"
      skip: true
  tags: always

- name: "Pre-tasks | Create user config directory"
  ansible.builtin.file:
    path: "{{ ansible_facts.user_dir }}/.config"
    state: directory
    mode: "0755"
    owner: "{{ ansible_facts.user_uid }}"
    group: "{{ ansible_facts.user_gid }}"
  tags: always

- name: "Pre-tasks | Create user systemd config directory"
  ansible.builtin.file:
    path: "{{ ansible_facts.user_dir }}/.config/systemd/user"
    state: directory
    mode: "0755"
    owner: "{{ ansible_facts.user_uid }}"
    group: "{{ ansible_facts.user_gid }}"
  when: ansible_facts.service_mgr == "systemd"
  tags: always
