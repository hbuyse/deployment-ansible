---
- name: "Pre-tasks | Define alternative architecture naming [Common]"
  ansible.builtin.set_fact:
    alt_arch: "{{ ansible_machine | replace('x86_64', 'amd64') | replace('aarch64', 'arm64') }}"
  tags: always

- name: "Pre-tasks | Detect NVIDIA GPU"
  ansible.builtin.shell:
    cmd: "set -o pipefail && lspci | grep -qoE '(VGA|3D).*NVIDIA'"
    executable: /bin/bash
  register: nvidia_detection
  tags: always
  changed_when: false
  failed_when: false

- name: "Pre-tasks | Get list of services"
  ansible.builtin.service_facts:

- name: "Pre-tasks | Run some OS specific tasks [{{ ansible_facts['os_family'] }}]"
  ansible.builtin.include_tasks:
    file: "{{ item }}"
    apply:
      tags: always
  with_first_found:
    - files:
        - "{{ ansible_facts['os_family'] | lower }}.yml"
      skip: true
  tags: always
