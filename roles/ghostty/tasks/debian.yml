---
- name: "Add PPA"
  become: true
  ansible.builtin.deb822_repository:
    name: ghostty
    enabled: true
    types: deb
    uris: "https://ppa.launchpadcontent.net/{{ ghostty_ppa.repo }}/ubuntu"
    suites: "{{ ansible_facts.distribution_release | lower }}"
    components:
      - main
    signed_by: "https://keyserver.ubuntu.com/pks/lookup?op=get&search=0x{{ ghostty_ppa.fingerprint }}"

- name: "Update repositories"
  become: true
  ansible.builtin.apt:
    update_cache: true
