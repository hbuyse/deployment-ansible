---
- name: "Ghostty | Include OS specific variables"
  ansible.builtin.include_vars: "{{ item }}"
  with_first_found:
    - files:
        - "{{ ansible_facts.os_family | lower }}.yml"
      skip: true
  tags: ghostty

- name: "Ghostty | Add repository [{{ ansible_facts.os_family }}]"
  ansible.builtin.include_tasks:
    file: "{{ item }}"
    apply:
      tags: ghostty
  with_first_found:
    - files:
        - "{{ ansible_facts.os_family | lower }}.yml"
      skip: true
  tags: ghostty

- name: "Ghostty | Install packages"
  become: true
  when: ghostty_packages is defined
  ansible.builtin.package:
    name: "{{ ghostty_packages }}"
    state: present
    update_cache: true
  tags: ghostty

- name: "Ghostty | Copy configuration"
  tags: ghostty
  block:
    - name: "Ghostty | Ensure configuration directory exists"
      ansible.builtin.file:
        path: "{{ ghostty_config_dir }}"
        state: "directory"
        mode: "0755"

    - name: "Ghostty | Copy configuration files"
      ansible.builtin.copy:
        src: "{{ role_path }}/files/"
        dest: "{{ ghostty_config_dir }}"
        mode: "0644"
