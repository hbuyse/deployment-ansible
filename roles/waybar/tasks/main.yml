---
- name: "Waybar | Include OS specific variables"
  ansible.builtin.include_vars: "{{ ansible_os_family | lower }}.yml"
  tags: waybar

- name: "Waybar | Install packages"
  ansible.builtin.package:
    name: "{{ waybar_packages }}"
    state: "present"
  tags: waybar

- name: "Waybar | Install configuration files"
  tags: waybar
  block:
    - name: "Sway | Ensure directories exists"
      ansible.builtin.file:
        path: "{{ ansible_user_dir }}/.config/waybar"
        state: directory
        mode: "0755"

    - name: "Sway | Copy configuration files"
      ansible.builtin.copy:
        src: "config/"
        dest: "{{ ansible_user_dir }}/.config/waybar/"
        mode: "preserve"
        directory_mode: "0755"

- name: "Waybar | Install service file"
  become: true
  tags: waybar
  block:
    - name: "Waybar | Ensure directories exists"
      ansible.builtin.file:
        path: "/usr/local/lib/systemd/user"
        state: "directory"
        mode: "0755"

    - name: "Waybar | Copy sway service and sway-session target files"
      ansible.builtin.copy:
        src: "service/waybar.service"
        dest: "/usr/local/lib/systemd/user/waybar.service"
        mode: "0644"

    - name: "Waybar | Enable service"
      become: false
      ansible.builtin.systemd:
        name: "waybar"
        daemon_reload: true
        enabled: true
        scope: "user"
      tags: waybar
