---
- name: "Spotify | Add repository"
  become: true
  ansible.builtin.deb822_repository:
    name: spotify
    enabled: true
    types: deb
    uris: "https://repository.spotify.com"
    suites: "stable"
    components:
      - non-free
    signed_by: "https://download.spotify.com/debian/pubkey_5384CE82BA52C83A.asc"

- name: "Spotify | Install from package manager"
  become: true
  ansible.builtin.package:
    name: "spotify-client"
    state: present
    update_cache: true
