---
- name: "Spotify | Add repository"
  become: true
  ansible.builtin.deb822_repository:
    name: spotify
    types: deb
    uris: "https://repository.spotify.com"
    suites: "stable"
    components:
      - non-free
    signed_by: "https://download.spotify.com/debian/pubkey_C85668DF69375001.gpg"
