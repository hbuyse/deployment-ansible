---
- name: "Bottom | Ensure that manpages directory exists [man1]"
  ansible.builtin.file:
    path: "{{ ansible_facts.user_dir }}/.local/share/man/man1"
    state: "directory"
    mode: "0755"
    recurse: true

- name: "Bottom | Install manpages [man1]"
  ansible.builtin.unarchive:
    src: "/tmp/manpage.tar.gz"
    dest: "{{ ansible_facts.user_dir }}/.local/share/man/man1"
    owner: "{{ ansible_facts.user_uid }}"
    group: "{{ ansible_facts.user_gid }}"
    mode: "0644"
    include:
      - "./btm.1.gz"
    extra_opts:
      - "--strip-components=1"
