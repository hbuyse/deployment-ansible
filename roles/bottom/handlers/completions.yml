---
- name: "Ensure that shell completion directory exists [{{ item.shell }}]"
  ansible.builtin.file:
    path: "{{ item.install_dir }}"
    state: "directory"
    mode: "0755"
    recurse: true

- name: "Copy shell completion file [{{ item.shell }}]"
  ansible.builtin.unarchive:
    src: "/tmp/completion.tar.gz"
    dest: "{{ item.install_dir }}"
    mode: "0644"
    owner: "{{ ansible_facts.user_uid }}"
    group: "{{ ansible_facts.user_gid }}"
    include:
      - "./{{ item.src_file }}"
    extra_opts:
      - "--strip-components=1"

- name: "Rename shell completion file [{{ item.shell }}]"
  when: item.src_file != item.dst_file
  block:
    - name: "Copy file"
      ansible.builtin.copy:
        src: "{{ item.install_dir }}/{{ item.src_file }}"
        dest: "{{ item.install_dir }}/{{ item.dst_file }}"
        owner: "{{ ansible_facts.user_uid }}"
        group: "{{ ansible_facts.user_gid }}"
        mode: "0644"

    - name: "Remove old one"
      ansible.builtin.file:
        state: absent
        path: "{{ item.install_dir }}/{{ item.src_file }}"
