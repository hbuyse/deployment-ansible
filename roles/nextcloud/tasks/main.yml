---
- name: "Include OS specific variables"
  ansible.builtin.include_vars: "{{ item }}"
  with_first_found:
    - files:
        - "{{ ansible_facts.os_family | lower }}.yml"
      skip: true
  tags: nextcloud

- name: "Add repository [{{ ansible_facts.os_family }}]"
  ansible.builtin.include_tasks:
    file: "{{ item }}"
    apply:
      tags: nextcloud
  with_first_found:
    - files:
        - "{{ ansible_facts.os_family | lower }}.yml"
      skip: true
  tags: nextcloud

- name: "Install packages"
  become: true
  when: nextcloud_packages is defined
  ansible.builtin.package:
    name: "{{ nextcloud_packages }}"
    state: present
  tags: nextcloud

- name: "Copy service file"
  ansible.builtin.copy:
    src: "nextcloud.service"
    dest: "{{ ansible_facts.user_dir }}/.config/systemd/user"
    mode: "0644"
    owner: "{{ ansible_facts.user_uid }}"
    group: "{{ ansible_facts.user_gid }}"
  notify: "Enable and restart nextcloud service"
