---
- name: "Include OS specific variables"
  ansible.builtin.include_vars: "{{ item }}"
  with_first_found:
    - files:
        - "{{ ansible_facts.os_family | lower }}.yml"
      skip: true
  tags: nextcloud

- name: "Add repository [{{ ansible_facts.os_family }}]"
  ansible.builtin.include_tasks:
    file: "{{ item }}"
    apply:
      tags: nextcloud
  with_first_found:
    - files:
        - "{{ ansible_facts.os_family | lower }}.yml"
      skip: true
  tags: nextcloud

- name: "Install packages"
  become: true
  when: nextcloud_packages is defined
  ansible.builtin.package:
    name: "{{ nextcloud_packages }}"
    state: present
  tags: nextcloud

- name: "Start service file"
  become: true
  tags: nextcloud
  block:
    - name: "Ensure directory exists"
      ansible.builtin.file:
        path: "{{ ansible_facts.user_dir }}/.config/systemd/user"
        state: directory
        mode: "0755"

    - name: "Copy service file"
      ansible.builtin.copy:
        src: "nextcloud.service"
        dest: "{{ ansible_facts.user_dir }}/.config/systemd/user"
        mode: "0644"

    - name: "Enable service"
      become: false
      ansible.builtin.systemd:
        name: "nextcloud"
        daemon_reload: true
        enabled: true
        scope: "user"
