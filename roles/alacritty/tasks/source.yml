---
- name: "Alacritty | Install dependencies"
  become: true
  ansible.builtin.package:
    name:
      - cmake
      - pkg-config
      - libfreetype6-dev
      - libfontconfig1-dev
      - libxcb-xfixes0-dev
      - libxkbcommon-dev
      - python3
    state: present

- name: "Alacritty | Install Rust package with locked dependencies"
  community.general.cargo:
    name: alacritty
    state: latest
    locked: true
  notify: "Alacritty | Install extras"
