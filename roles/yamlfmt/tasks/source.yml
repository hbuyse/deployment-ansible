---
- name: "YamlFmt | Get latest version number"
  register: yamlfmt_latest_json
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ yamlfmt_github_user }}/{{ yamlfmt_github_repo }}/releases/latest"
    method: GET
    return_content: true
    status_code: 200
    body_format: json

- name: "YamlFmt | Set facts"
  ansible.builtin.set_fact:
    yamlfmt_latest_version: "{{ yamlfmt_latest_json.json.tag_name[1:] }}"

- name: "YamlFmt | Install executable"
  become: true
  ansible.builtin.unarchive:
    src: "https://github.com/{{ yamlfmt_github_user }}/{{ yamlfmt_github_repo }}/releases/download/v{{ yamlfmt_latest_version
      }}/yamlfmt_{{ yamlfmt_latest_version }}_{{ ansible_facts['system'] }}_{{ ansible_facts['architecture'] }}.tar.gz"
    dest: "{{ ansible_user_dir }}/.local/bin"
    mode: "0755"
    owner: "{{ ansible_facts['user_uid'] }}"
    group: "{{ ansible_facts['user_gid'] }}"
    include:
      - "yamlfmt"
    remote_src: true
