---
- name: "Include OS specific variables"
  ansible.builtin.include_vars: "{{ item }}"
  with_first_found:
    - files:
        - "{{ ansible_facts.os_family | lower }}.yml"
      skip: true
  tags: keymapp

- name: "Install dependencies"
  become: true
  ansible.builtin.package:
    state: present
    name: "{{ keymapp_dependencies }}"
  when: keymapp_dependencies is defined
  tags: keymapp

- name: "Download latest archive"
  ansible.builtin.get_url:
    url: "https://oryx.nyc3.cdn.digitaloceanspaces.com/keymapp/keymapp-latest.tar.gz"
    dest: "/tmp/"
    mode: "0644"
  notify: "Remove keymapp downloaded archive"
  tags: keymapp

- name: "Ensure directory exist"
  become: "{{ keymapp_become }}"
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ keymapp_bin_dir }}"
    - "{{ keymapp_icons_dir }}"
  tags: keymapp

- name: "Extract archive files"
  become: "{{ keymapp_become }}"
  ansible.builtin.unarchive:
    src: "/tmp/keymapp-latest.tar.gz"
    dest: "{{ item.dest }}"
    mode: "{{ item.mode }}"
    owner: "{{ ansible_facts.user_uid }}"
    group: "{{ ansible_facts.user_gid }}"
    include:
      - "{{ item.file }}"
  loop:
    - file: keymapp
      dest: "{{ keymapp_bin_dir }}"
      mode: "0755"
    - file: icon.png
      dest: "{{ keymapp_icons_dir }}"
      mode: "0644"
  tags: keymapp

- name: "Rename icon file"
  become: "{{ keymapp_become }}"
  tags: keymapp
  block:
    - name: "Copy icon file"
      ansible.builtin.copy:
        src: "{{ keymapp_icons_dir }}/icon.png"
        dest: "{{ keymapp_icons_dir }}/keymapp.png"
        mode: "0644"

    - name: "Remove old icon file"
      ansible.builtin.file:
        path: "{{ keymapp_icons_dir }}/icon.png"
        state: absent

- name: "Copy desktop file"
  become: "{{ keymapp_become }}"
  ansible.builtin.copy:
    src: "keymapp.desktop"
    dest: "{{ keymapp_desktop_dir }}"
    mode: "0644"
  tags: keymapp

- name: "Copy udev rule files"
  become: true
  ansible.builtin.template:
    src: "50-zsa.rules.j2"
    dest: "/etc/udev/rules.d/50-zsa.rules"
    mode: "0644"
  tags: keymapp

- name: "Add current user to 'plugdev' group"
  become: true
  when: ansible_facts.os_family == "Debian"
  ansible.builtin.user:
    name: "{{ ansible_facts.user_id }}"
    groups: "plugdev"
    append: true
  tags: keymapp
