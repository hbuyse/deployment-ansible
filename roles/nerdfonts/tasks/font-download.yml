---
- name: "Ensure font directory exists [{{ item }}]"
  become: true
  ansible.builtin.file:
    path: "{{ nerdfonts_font_dir_prefix }}/{{ item }}"
    recurse: true
    mode: "0755"
    state: directory

- name: "Download fonts [{{ item }}]"
  become: true
  ansible.builtin.unarchive:
    src: "https://github.com/ryanoasis/nerd-fonts/releases/download/v{{ nerdfonts_latest_version }}/{{ item }}.tar.xz"
    dest: "{{ nerdfonts_font_dir_prefix }}/{{ item }}"
    mode: "0644"
    remote_src: true
    owner: "{{ ansible_facts.user_uid }}"
    group: "{{ ansible_facts.user_gid }}"
  notify: "Build font information caches"
