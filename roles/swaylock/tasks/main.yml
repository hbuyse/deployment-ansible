---
- name: "Include OS specific variables"
  ansible.builtin.include_vars: "{{ item }}"
  with_first_found:
    - files:
        - "{{ ansible_facts.os_family | lower }}.yml"
      skip: true
  tags: swaylock

- name: "Install packages"
  become: true
  ansible.builtin.package:
    name: "{{ swaylock_packages }}"
    state: present
  tags: swaylock
  when:
    - swaylock_packages is defined
    - ansible_facts.os_family != "Archlinux"

- name: "Install packages"
  kewlfft.aur.aur:
    name: "{{ swaylock_packages }}"
    use: yay
    state: present
  tags: swaylock
  when:
    - swaylock_packages is defined
    - ansible_facts.os_family == "Archlinux"

- name: "Install configuration"
  tags: swaylock
  block:
    - name: "Ensure directory exist"
      ansible.builtin.file:
        path: "{{ ansible_facts.user_dir }}/.config/swaylock"
        state: directory
        mode: "0755"

    - name: "Copy configuration"
      ansible.builtin.template:
        src: "config.j2"
        dest: "{{ ansible_facts.user_dir }}/.config/swaylock/config"
        mode: "0644"

- name: "Install service file"
  become: true
  tags: swaylock
  block:
    - name: "Ensure directory exist"
      ansible.builtin.file:
        path: "{{ ansible_facts.user_dir }}/.config/systemd/user/"
        state: directory
        mode: "0755"

    - name: "Copy service file"
      ansible.builtin.copy:
        src: "swaylock.service"
        dest: "{{ ansible_facts.user_dir }}/.config/systemd/user/swaylock.service"
        mode: "0644"
      tags: swaylock
