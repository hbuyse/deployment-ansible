---
- name: "Ripgrep | Ensure completion directory exists [{{ item.shell }}]"
  ansible.builtin.file:
    path: "{{ install_dir }}"
    state: directory
    mode: "0755"
  vars:
    install_dir: "{{ item.filepath | ansible.builtin.dirname }}"

- name: "Ripgrep | Install completion file [{{ item.shell }}]"
  ansible.builtin.shell:
    cmd: "rg --generate complete-{{ item.shell }} > {{ item.filepath }}"
  register: ripgrep_output
  changed_when: ripgrep_output.rc != 0
