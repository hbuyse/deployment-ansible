---
- name: "Include OS specific variables"
  ansible.builtin.include_vars: "{{ item }}"
  with_first_found:
    - files:
        - "{{ ansible_facts.os_family | lower }}.yml"
      skip: true
  tags:
    - git
    - git-delta

- name: "Install package [Rolling Release]"
  become: true
  ansible.builtin.package:
    name: "{{ git_delta_packages }}"
    state: present
  when: git_delta_packages is defined
  tags:
    - git
    - git-delta

- name: "Install package [Debian]"
  when: git_delta_packages is not defined
  community.general.cargo:
    name: "{{ git_delta_cargo_package }}"
    state: latest
    locked: true
  tags:
    - git
    - git-delta
  notify: "Install completion files"

- name: "Install configuration"
  tags:
    - git
    - git-delta
  block:
    - name: "Ensure git directory exists"
      ansible.builtin.file:
        path: "{{ ansible_facts.user_dir }}/.config/git"
        state: directory
        mode: "0755"

    - name: "Copy git-delta configuration"
      ansible.builtin.copy:
        src: "delta"
        dest: "{{ ansible_facts.user_dir }}/.config/git"
        mode: "0644"

- name: "Install themes"
  tags:
    - git
    - git-delta
  block:
    - name: "Ensure themes directory exists"
      ansible.builtin.file:
        path: "{{ ansible_facts.user_dir }}/.config/git/themes"
        state: directory
        mode: "0755"

    - name: "Download git delta themes"
      ansible.builtin.get_url:
        url: "https://raw.githubusercontent.com/dandavison/delta/refs/heads/main/themes.gitconfig"
        dest: "{{ ansible_facts.user_dir }}/.config/git/themes/themes.conf"
        mode: "0644"

    - name: "Download catppuccin theme"
      ansible.builtin.get_url:
        url: "https://raw.githubusercontent.com/catppuccin/delta/refs/heads/main/catppuccin.gitconfig"
        dest: "{{ ansible_facts.user_dir }}/.config/git/themes/catppuccin.conf"
        mode: "0644"
