---
- name: "CodeSpell | Include OS specific variables"
  ansible.builtin.include_vars: "{{ item }}"
  with_first_found:
    - files:
        - "{{ ansible_facts['os_family'] | lower }}.yml"
      skip: true
  tags:
    - codespell
    - formatter

- name: "CodeSpell | Install from package manager"
  become: true
  ansible.builtin.package:
    name: "{{ codespell_packages }}"
    state: "present"
  tags:
    - codespell
    - formatter
  when: codespell_packages is defined

- name: "CodeSpell | Install from source"
  community.general.pipx:
    name: "codespell"
    state: "latest"
  tags:
    - codespell
    - formatter
  when: (codespell_packages is not defined) or codespell_force_source_install
