---
- name: "Check if cargo is installed"
  ansible.builtin.shell:
    cmd: command -v cargo
    executable: /bin/bash
  register: rustup_cargo_exists
  changed_when: false
  ignore_errors: true

- name: "Install Rustup and Cargo"
  when: rustup_cargo_exists is failed
  tags:
    - rust
  block:
    - name: "Install dependencies"
      become: true
      ansible.builtin.package:
        name: curl
        state: present

    - name: "Download Installer"
      ansible.builtin.get_url:
        url: https://sh.rustup.rs
        dest: "{{ rustup_tmp_dir }}/sh.rustup.rs"
        mode: "0755"
        force: "yes"

    - name: "Install Rust and Cargo from script"
      when: rustup_cargo_exists is failed
      ansible.builtin.shell: "{{ rustup_tmp_dir }}/sh.rustup.rs -y"
      args:
        creates: "{{ ansible_facts.user_dir }}/.cargo/bin/rustup"
        executable: /bin/bash
      environment:
        RUSTUP_HOME: "{{ ansible_facts.user_dir }}/.rustup"
        CARGO_HOME: "{{ ansible_facts.user_dir }}/.cargo"
