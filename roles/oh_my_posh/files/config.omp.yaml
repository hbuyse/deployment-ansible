---
# yaml-language-server: $schema=https://raw.githubusercontent.com/JanDeDobbeleer/oh-my-posh/main/themes/schema.json
palette:
  status-fg-error: '#FF5252'
  status-fg-success: '#5faf00'
palettes:
  list:
    catppuccin-frappe:
      base: '#303446'
      blue: '#8caaee'
      crust: '#232634'
      flamingo: '#eebebe'
      green: '#a6d189'
      lavender: '#babbf1'
      mantle: '#292c3c'
      maroon: '#ea999c'
      mauve: '#ca9ee6'
      overlay0: '#737994'
      overlay1: '#838ba7'
      overlay2: '#949cbb'
      peach: '#ef9f76'
      pink: '#f4b8e4'
      red: '#e78284'
      rosewater: '#f2d5cf'
      sapphire: '#85c1dc'
      sky: '#99d1db'
      subtext0: '#a5adce'
      subtext1: '#b5bfe2'
      surface0: '#414559'
      surface1: '#51576d'
      surface2: '#626880'
      teal: '#81c8be'
      text: '#c6d0f5'
      yellow: '#e5c890'
    catppuccin-macchiato:
      base: '#24273a'
      blue: '#8aadf4'
      crust: '#181926'
      flamingo: '#f0c6c6'
      green: '#a6da95'
      lavender: '#b7bdf8'
      mantle: '#1e2030'
      maroon: '#ee99a0'
      mauve: '#c6a0f6'
      overlay0: '#6e738d'
      overlay1: '#8087a2'
      overlay2: '#939ab7'
      peach: '#f5a97f'
      pink: '#f5bde6'
      red: '#ed8796'
      rosewater: '#f4dbd6'
      sapphire: '#7dc4e4'
      sky: '#91d7e3'
      subtext0: '#a5adcb'
      subtext1: '#b8c0e0'
      surface0: '#363a4f'
      surface1: '#494d64'
      surface2: '#5b6078'
      teal: '#8bd5ca'
      text: '#cad3f5'
      yellow: '#eed49f'
    catppuccin-mocha:
      base: '#1e1e2e'
      blue: '#89b4fa'
      crust: '#11111b'
      flamingo: '#f2cdcd'
      green: '#a6e3a1'
      lavender: '#b4befe'
      mantle: '#181825'
      maroon: '#eba0ac'
      mauve: '#cba6f7'
      overlay0: '#6c7086'
      overlay1: '#7f849c'
      overlay2: '#9399b2'
      peach: '#fab387'
      pink: '#f5c2e7'
      red: '#f38ba8'
      rosewater: '#f5e0dc'
      sapphire: '#74c7ec'
      sky: '#89dceb'
      subtext0: '#a6adc8'
      subtext1: '#bac2de'
      surface0: '#313244'
      surface1: '#45475a'
      surface2: '#585b70'
      teal: '#94e2d5'
      text: '#cdd6f4'
      yellow: '#f9e2af'
  template: catppuccin-mocha
blocks:
  - type: prompt
    alignment: left
    segments:
      - options:
          cache_duration: none
        template: ' {{ if .WSL }}WSL at {{ end }}{{.Icon}} оӮұ'
        foreground: p:text
        background: p:surface0
        type: os
        style: plain
      - options:
          cache_duration: none
        template: ' пғ§ <#bac2de>оӮұ</>'
        foreground: p:red
        background: p:surface0
        type: root
        style: plain
      - options:
          cache_duration: none
          edge_format: <b>%s</b>
          max_width: 80
          style: full
        foreground: p:sapphire
        background: p:surface0
        type: path
        style: plain
        templates:
          - ' пҒј '
          - '{{ .Path }} '
          - '{{ if not .Writable }}пҖЈ {{ end }}'
      - options:
          branch_ahead_icon: пҒў
          branch_behind_icon: пҒЈ
          branch_gone_icon: оӘё
          branch_icon: 'п„Ұ '
          branch_identical_icon: п‘„
          branch_max_length: 0
          cache_duration: none
          cherry_pick_icon: 'оҠӣ '
          commit_icon: 'пҗ— '
          fetch_stash_count: true
          fetch_status: true
          fetch_upstream_icon: true
          full_branch_path: true
          git_icon: 'о—» '
          merge_icon: 'оң§ '
          no_commits_icon: 'п–” '
          rebase_icon: 'оңЁ '
          revert_icon: 'пғў '
          tag_icon: 'пҗ’ '
        foreground: p:green
        background: p:surface0
        type: git
        style: plain
        templates:
          - <#bac2de>оӮұ</> {{ .HEAD }}
          - '{{ if .BranchStatus }} {{ .BranchStatus }} {{ end }}'
          - '{{ if .Staging.Changed }}оӮұ о©  {{ .Staging.String }} {{ end }}'
          - '{{ if .Working.Changed }}оӮұ пҒҖ {{ .Working.String }} {{ end }}'
          - '{{ if gt .StashCount 0 }}оӮұ пғҮ {{ .StashCount }} {{ end }}'
      - options:
          cache_duration: none
        template: оӮ°
        foreground: p:surface0
        background: transparent
        type: text
        style: plain
  - type: prompt
    alignment: right
    filler: <#313244,transparent>В·</>
    overflow: hide
    segments:
      - options:
          cache_duration: none
        template: оӮІ
        foreground: p:surface0
        background: transparent
        type: text
        style: plain
      - options:
          cache_duration: none
          status_template: '{{ reason .Code }}'
        foreground: p:green
        background: p:surface0
        type: status
        style: plain
        foreground_templates:
          - '{{ if .Error }}p:red{{ end }}'
        templates:
          - '{{ if .Error }} {{ .String }} пҖҚ {{ end }}'
          - <#bac2de>оӮі</>
      - options:
          cache_duration: none
          style: austin
          threshold: 500
        foreground: p:subtext0
        background: p:surface0
        type: executiontime
        style: plain
        templates:
          - ' {{ .FormattedMs }}'
          - " \U000F199F"
          - ' <#bac2de>оӮі</>'
      - options:
          cache_duration: none
        template: '{{ if .Env.DIRENV_FILE }} пҖ“ <#bac2de>оӮі</>{{ end }}'
        foreground: p:yellow
        background: p:surface0
        type: text
        style: plain
      - options:
          cache_duration: none
        foreground: p:sky
        background: p:surface0
        type: node
        style: plain
        templates:
          - ' {{ if .Error }}{{ .Error }}{{ else }}{{ .PackageManagerName }}{{ if .Full }} {{ .Full }}{{ end }}{{ end }}'
          - ' {{ if .PackageManagerIcon }}{{ .PackageManagerIcon }}{{ else }}п’Ү{{ end }}'
          - ' <#bac2de>оӮі</>'
      - options:
          cache_duration: none
          extensions:
            - '*.cmake'
            - CMakeLists.txt
            - CMakeCache.txt
        foreground: p:sky
        background: p:surface0
        type: cmake
        style: plain
        templates:
          - ' {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }}'
          - ' оҳһ оҳқ'
          - ' <#bac2de>оӮі</>'
      - options:
          cache_duration: none
        foreground: p:sky
        background: p:surface0
        type: python
        style: plain
        templates:
          - ' {{ if .Error }}{{ .Error }}{{ else }}{{ if .Venv }}{{ .Venv }} {{ end }}{{ .Full }}{{ end }}'
          - ' оҲө'
          - ' <#bac2de>оӮі</>'
      - options:
          cache_duration: none
        foreground: p:sky
        background: p:surface0
        type: rust
        style: plain
        templates:
          - ' {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }}'
          - ' оһЁ'
          - ' <#bac2de>оӮі</>'
      - options:
          cache_duration: none
        foreground: p:sky
        background: p:surface0
        type: lua
        style: plain
        templates:
          - ' {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }}'
          - ' оҳ '
          - ' <#bac2de>оӮі</>'
      - options:
          cache_duration: none
        foreground: p:sky
        background: p:surface0
        type: perl
        style: plain
        templates:
          - ' {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }}'
          - ' оҷҫ'
          - ' <#bac2de>оӮі</>'
      - options:
          cache_duration: none
        foreground: p:sky
        background: p:surface0
        type: go
        style: plain
        templates:
          - ' {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }}'
          - ' оҳ§'
          - ' <#bac2de>оӮі</>'
      - options:
          cache_duration: none
        foreground: p:yellow
        background: p:surface0
        type: session
        style: plain
        templates:
          - ' {{ .UserName }}@{{ .HostName }}'
          - ' {{ if .SSHSession }}о®©{{ else if .Root }}пғ§{{ else }}пҖҮ{{ end }}'
          - ' <#bac2de>оӮі</>'
      - options:
          cache_duration: none
          time_format: "15:04:05"
        template: ' {{ .CurrentDate | date .Format }} пҖ— '
        foreground: p:subtext1
        background: p:surface0
        type: time
        style: plain
  - type: prompt
    alignment: left
    segments:
      - options:
          always_enabled: true
          cache_duration: none
        template: 'вқҜ '
        foreground: p:green
        background: transparent
        type: status
        style: plain
        foreground_templates:
          - '{{ if .Error }}p:red{{ end }}'
    newline: true
version: 3
