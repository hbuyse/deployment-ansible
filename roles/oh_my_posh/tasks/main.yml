---
- name: "Get latest version number"
  register: oh_my_posh_latest_json
  ansible.builtin.uri:
    url: "https://api.github.com/repos/JanDeDobbeleer/oh-my-posh/releases/latest"
    method: GET
    return_content: true
    status_code: 200
    body_format: json
  tags:
    - oh_my_posh
    - shell

- name: "Set facts"
  ansible.builtin.set_fact:
    oh_my_posh_latest_version: "{{ oh_my_posh_latest_json.json.tag_name[1:] }}"
  tags:
    - oh_my_posh
    - shell

- name: "Install binary [v{{ oh_my_posh_latest_version }}]"
  ansible.builtin.get_url:
    url: "https://github.com/JanDeDobbeleer/oh-my-posh/releases/download/v{{ oh_my_posh_latest_version }}/posh-{{ ansible_facts.system
      | lower }}-{{ alt_arch }}"
    dest: "{{ ansible_facts.user_dir }}/.local/bin/oh-my-posh"
    mode: "0755"
    owner: "{{ ansible_facts.user_uid }}"
    group: "{{ ansible_facts.user_gid }}"
  notify: "Clear cache"
  tags:
    - oh_my_posh
    - shell

- name: "Ensure config directory exists"
  ansible.builtin.file:
    path: "{{ ansible_facts.user_dir }}/.config/oh-my-posh"
    state: directory
    mode: "0755"
  tags:
    - oh_my_posh
    - shell

- name: "Copy configuration file"
  ansible.builtin.copy:
    src: "config.omp.yaml"
    dest: "{{ ansible_facts.user_dir }}/.config/oh-my-posh"
    mode: "0644"
  notify: "Clear cache"
  tags:
    - oh_my_posh
    - shell
