---
- name: "Themes | Include OS specific variables"
  ansible.builtin.include_vars: "{{ item }}"
  with_first_found:
    - files:
        - "{{ ansible_os_family | lower }}.yml"
      skip: true
  tags:
    - themes
    - theming

- name: "Themes | Ensure directory exist"
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  tags:
    - themes
    - theming
  loop:
    - "{{ themes_dir }}"
    - "{{ themes_gtk_dir }}"

- name: "Themes | Copy static files"
  tags:
    - themes
    - theming
  ansible.builtin.copy:
    src: "{{ item }}.gtk3.css"
    dest: "{{ themes_dir }}"
    mode: "0644"
    owner: "{{ ansible_user_uid }}"
    group: "{{ ansible_user_gid }}"
  loop: "{{ themes_list | list }}"

- name: "Themes | Download files"
  tags:
    - themes
    - theming
  ansible.builtin.get_url:
    url: "{{ item.url }}"
    dest: "{{ themes_dir }}/{{ item.destname }}"
    mode: "0644"
    owner: "{{ ansible_user_uid }}"
    group: "{{ ansible_user_gid }}"
  loop:
    - url: "https://cdn.jsdelivr.net/npm/@catppuccin/palette/css/catppuccin.css"
      destname: "catppuccin.gtk4.css"

- name: "Themes | Install dependencies"
  become: true
  ansible.builtin.package:
    state: present
    name: "{{ themes_packages_dependencies }}"
  when: themes_packages_dependencies is defined
  tags:
    - themes
    - theming

- name: "Themes | Get Gnome Shell version"
  ansible.builtin.shell:
    cmd: "set -o pipefail && gnome-shell --version | grep -oE '[0-9]+\\.[0-9]+'"
    executable: /bin/bash
  register: themes_gnome_shell_version
  changed_when: themes_gnome_shell_version.rc != 0
  tags:
    - themes
    - theming

- name: "Themes | Install"
  ansible.builtin.include_tasks:
    file: "{{ item.task_file }}.yml"
    apply:
      tags:
        - themes
        - theming
  when: "themes_gnome_shell_version.stdout_lines[0] is version(item.gnome_version_min, '>=')"
  loop:
    - task_file: "matcha"
      gnome_version_min: "42.0"
    - task_file: "catppuccin"
      gnome_version_min: "49.0"
  tags:
    - themes
    - theming
