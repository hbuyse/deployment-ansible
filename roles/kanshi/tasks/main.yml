---
- name: "Kanshi | Include OS specific variables"
  ansible.builtin.include_vars: "{{ item }}"
  with_first_found:
    - files:
        - "{{ ansible_os_family | lower }}.yml"
  tags: kanshi

- name: "Kanshi | Install required packages"
  become: true
  ansible.builtin.package:
    name: "{{ kanshi_packages }}"
  tags: kanshi

- name: "Kanshi | Install static configuration files"
  tags: kanshi
  block:
    - name: "Kanshi | Ensure directory exist"
      ansible.builtin.file:
        path: "{{ ansible_user_dir }}/.config/kanshi"
        state: directory
        mode: "0755"

    - name: "Kanshi | Copy configuration"
      ansible.builtin.copy:
        src: "config"
        dest: "{{ ansible_user_dir }}/.config/kanshi"
        mode: "0644"
      notify: "Kanshi | Enable and restart service"

    - name: "Kanshi | Copy configuration"
      ansible.builtin.copy:
        src: "config.d"
        dest: "{{ ansible_user_dir }}/.config/kanshi"
        mode: "0644"
      notify: "Kanshi | Enable and restart service"

    - name: "Kanshi | Copy notify hook script"
      ansible.builtin.copy:
        src: "notify.sh"
        dest: "{{ ansible_user_dir }}/.config/kanshi"
        mode: "0755"

- name: "Kanshi | Include 'work' variables"
  ansible.builtin.include_vars:
    file: "work.yml"
  tags: kanshi

- name: "Kanshi | Install dynamic configuration files"
  when:
    - ansible_hostname == 'hbuyse-latitude5400'
    - kanshi_work_confs is defined
  tags: kanshi
  block:
    - name: "Kanshi | Ensure directory exist"
      ansible.builtin.file:
        path: "{{ ansible_user_dir }}/.config/kanshi/config.d"
        state: directory
        mode: "0755"

    - name: "Kanshi | Generate 'work' configuration"
      ansible.builtin.template:
        src: "work.j2"
        dest: "{{ ansible_user_dir }}/.config/kanshi/config.d/work"
        mode: "0644"
      notify: "Kanshi | Enable and restart service"

- name: "Kanshi | Install service file"
  become: true
  tags: kanshi
  block:
    - name: "Kanshi | Ensure directory exist"
      ansible.builtin.file:
        path: "/usr/local/lib/systemd/user"
        state: directory
        mode: "0755"

    - name: "Kanshi | Copy service file"
      ansible.builtin.get_url:
        url: "https://raw.githubusercontent.com/xdbob/sway-services/refs/heads/master/systemd/kanshi.service"
        dest: "/usr/local/lib/systemd/user"
        mode: "0644"
      tags: kanshi
      notify: "Kanshi | Enable and restart service"
