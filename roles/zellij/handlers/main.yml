---
- name: "Zellij | Install completion files"
  ansible.builtin.include_tasks:
    file: completions.yml
  loop:
    - shell: zsh
      filepath: "{{ ansible_user_dir }}/.local/share/zsh/site-functions/_zellij"
    - shell: bash
      filepath: "{{ ansible_user_dir }}/.local/share/bash-completion/completions/zellij"
