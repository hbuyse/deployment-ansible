---
- name: "Spotify Player | Install zsh completion file"
  become: true
  tags: spotify_player
  block:
    - name: "Spotify Player | Ensure zsh-completion directory exists"
      ansible.builtin.file:
        path: "{{ ansible_facts['user_dir'] }}/.local/share/zsh/site-functions"
        state: "directory"
        mode: "0755"

    - name: "Spotify Player | Install zsh completion file"
      ansible.builtin.shell:
        cmd: "spotify_player generate zsh > {{ ansible_facts['user_dir'] }}/.local/share/zsh/site-functions/_spotify_player"
        creates: "{{ ansible_facts['user_dir'] }}/.local/share/zsh/site-functions/_spotify_player"

- name: "Spotify Player | Install bash completion file"
  become: true
  tags: spotify_player
  block:
    - name: "Spotify Player | Ensure bash-completion directory exists"
      ansible.builtin.file:
        path: "{{ ansible_facts['user_dir'] }}/.local/share/bash-completion/completions"
        state: "directory"
        mode: "0755"

    - name: "Spotify Player | Install bash completion file"
      ansible.builtin.shell:
        cmd: "spotify_player generate zsh > {{ ansible_facts['user_dir'] }}/.local/share/bash-completion/completions/_spotify_player"
        creates: "{{ ansible_facts['user_dir'] }}/.local/share/bash-completion/completions/_spotify_player"
