---
# tasks file for sway
- name: Install required packages [Suse]
  ansible.builtin.include_tasks:
    file: suse.yml
  when: ansible_os_family == "Suse"

- name: Install required packages [Archlinux]
  ansible.builtin.include_tasks:
    file: archlinux.yml
  when: ansible_os_family == "Archlinux"

- name: Copy sway service file
  copy:
    src: sway.service
    dest: /usr/local/lib/systemd/user/
  become: true
  tags:
    - configure_files

- name: Copy wayland-session file for sway
  copy:
    src: sway.desktop
    dest: /usr/local/share/wayland-sessions
  become: true
  tags:
    - configure_files

- name: Copy sway-session target file
  copy:
    src: sway-session.target
    dest: /usr/local/lib/systemd/user/
  become: true
  tags:
    - configure_files

- name: Copy sway-wrapper shell script
  copy:
    src: sway-wrapper.sh
    dest: /usr/local/bin
    mode: 0755
  become: true
  tags:
    - configure_files
