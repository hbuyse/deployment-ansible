---
- name: "Eza | Ensure that manpages directory exists [man{{ item.number }}]"
  become: true
  ansible.builtin.file:
    path: "{{ ansible_user_dir }}/.local/share/man/man{{ item.number }}"
    state: "directory"
    mode: "0755"

- name: "Eza | Install manpages [man{{ item.number }}]"
  become: true
  ansible.builtin.unarchive:
    src: "/tmp/man-{{ eza_latest_version }}.tar.gz"
    dest: "{{ ansible_user_dir }}/.local/share/man/man{{ item.number }}"
    mode: "0644"
    owner: "{{ ansible_user_uid }}"
    group: "{{ ansible_facts['user_gid'] }}"
    include:
      - "./target/man-{{ eza_latest_version }}/{{ item.name }}.{{ item.number }}"
    extra_opts:
      - "--strip-components=3"
