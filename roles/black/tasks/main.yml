---
- name: "Black | Include OS specific variables"
  ansible.builtin.include_vars: "{{ item }}"
  with_first_found:
    - files:
        - "{{ ansible_facts['os_family'] | lower }}.yml"
      skip: true
  tags:
    - black
    - formatter

- name: "Black | Install from package manager"
  become: true
  ansible.builtin.package:
    name: "{{ black_packages }}"
    state: "present"
  tags:
    - black
    - formatter
  when: black_packages is defined

- name: "Black | Install from source"
  community.general.pipx:
    name: "black"
    state: "latest"
    executable: "{{ ansible_facts.user_dir }}/.local/bin/pipx"
  tags:
    - black
    - formatter
  when: (black_packages is not defined) or black_force_source_install
