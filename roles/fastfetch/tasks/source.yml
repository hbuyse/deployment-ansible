---
- name: "Fastfetch | Get latest version number"
  register: fastfetch_latest_json
  ansible.builtin.uri:
    url: "https://api.github.com/repos/fastfetch-cli/fastfetch/releases/latest"
    method: GET
    return_content: true
    status_code: 200
    body_format: json

- name: "Fastfetch | Set facts"
  ansible.builtin.set_fact:
    fastfetch_latest_version: "{{ fastfetch_latest_json.json.tag_name }}"

- name: "Fastfetch | Install fastfetch from GitHub [v{{ fastfetch_latest_version }}]"
  become: true
  ansible.builtin.unarchive:
    src: "https://github.com/fastfetch-cli/fastfetch/releases/download/{{ fastfetch_latest_version }}/fastfetch-{{ ansible_facts['system']
      | lower }}-{{ alt_arch }}.tar.gz"
    dest: "{{ fastfetch_install_dir }}"
    remote_src: true
    extra_opts:
      - "--strip-components=2"
    owner: "{{ ansible_facts['user_uid'] }}"
    group: "{{ ansible_facts['user_gid'] }}"
