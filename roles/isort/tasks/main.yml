---
- name: "Isort | Include OS specific variables"
  ansible.builtin.include_vars: "{{ item }}"
  with_first_found:
    - files:
        - "{{ ansible_facts.os_family | lower }}.yml"
      skip: true
  tags:
    - isort
    - formatter

- name: "Isort | Install from package manager"
  become: true
  ansible.builtin.package:
    name: "{{ isort_packages }}"
    state: "present"
  tags:
    - isort
    - formatter
  when: isort_packages is defined

- name: "Isort | Install from source"
  community.general.pipx:
    name: "isort"
    state: "latest"
    executable: "{{ ansible_facts.user_dir }}/.local/bin/pipx"
  tags:
    - isort
    - formatter
  when: (isort_packages is not defined) or isort_force_source_install
