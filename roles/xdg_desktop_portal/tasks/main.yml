---
- name: "Include OS specific variables"
  ansible.builtin.include_vars: "{{ item }}"
  with_first_found:
    - files:
        - "{{ ansible_facts.os_family | lower }}.yml"
      skip: true
  tags:
    - xdg_desktop_portal

- name: "Install packages"
  become: true
  ansible.builtin.package:
    name: "{{ xdg_desktop_portal_packages }}"
    state: "present"
  tags:
    - xdg_desktop_portal

- name: "Copy configuration"
  tags:
    - xdg_desktop_portal
  block:
    - name: "Ensure configuration directory exists"
      ansible.builtin.file:
        path: "{{ xdg_desktop_portal_wlr_user_dir }}"
        state: "directory"
        mode: "0755"

    - name: "Copy configuration files"
      ansible.builtin.copy:
        src: "xdg-desktop-portal-wlr/config"
        dest: "{{ xdg_desktop_portal_wlr_user_dir }}"
        mode: "0644"
      notify: "Restart XDG Desktop Portal Wlr service"

    - name: "Copy script"
      ansible.builtin.copy:
        src: "xdg-desktop-portal-wlr/script.sh"
        dest: "{{ xdg_desktop_portal_wlr_user_dir }}"
        mode: "0755"
