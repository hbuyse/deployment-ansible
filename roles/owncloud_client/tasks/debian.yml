---
- name: "Owncloud Client | Install repository [Debian]"
  become: true
  ansible.builtin.deb822_repository:
    name: owncloud-client
    enabled: true
    types: deb
    uris: "https://download.owncloud.com/desktop/ownCloud/stable/latest/linux/{{ ansible_facts.distribution }}_{{ ansible_facts.distribution_version
      }}/"
    suites: "/"
    architectures:
      - "{{ deb_arch }}"
    signed_by: "https://download.owncloud.com/desktop/ownCloud/stable/latest/linux/{{ ansible_facts.distribution }}_{{ ansible_facts.distribution_version }}/Release.key"

- name: "Owncloud Client | Update APT cache"
  become: true
  ansible.builtin.apt:
    update_cache: true
