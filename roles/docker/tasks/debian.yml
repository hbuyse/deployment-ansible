---
- name: "Docker | Install repository [Debian]"
  become: true
  ansible.builtin.deb822_repository:
    name: docker
    enabled: true
    types: deb
    uris: "https://download.docker.com/linux/{{ ansible_facts.distribution | lower }}"
    suites: "{{ ansible_facts.distribution_release }}"
    components:
      - stable
    architectures:
      - "{{ deb_arch }}"
    signed_by: "https://download.docker.com/linux/{{ ansible_facts.distribution | lower }}/gpg"

- name: "Docker | Update APT cache"
  become: true
  ansible.builtin.apt:
    update_cache: true
