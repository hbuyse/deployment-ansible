---
- name: "Include OS specific variables"
  ansible.builtin.include_vars: "{{ item }}"
  with_first_found:
    - files:
        - "{{ ansible_facts.os_family | lower }}.yml"
      skip: true
  tags: nodejs

- name: "Add repository [{{ ansible_facts.os_family }}]"
  ansible.builtin.include_tasks:
    file: "{{ item }}"
    apply:
      tags: nodejs
  with_first_found:
    - files:
        - "{{ ansible_facts.os_family | lower }}.yml"
      skip: true
  tags: nodejs

- name: "Install package and npm [{{ ansible_facts.os_family }}]"
  become: true
  ansible.builtin.package:
    name: "{{ nodejs_packages }}"
    state: present
  tags: nodejs
