---
- name: "Install dependencies [{{ ansible_facts.os_family }}]"
  become: true
  ansible.builtin.package:
    name: "{{ nodejs_dependencies }}"
    state: present

- name: "Add NodeSource deb repository {{ ansible_facts.os_family }}]"
  become: true
  ansible.builtin.deb822_repository:
    name: nodesource
    enabled: true
    types: deb
    uris: "https://deb.nodesource.com/node_{{ nodejs_version }}.x"
    suites: "nodistro"
    components:
      - main
    architectures: "{{ deb_arch }}"
    signed_by: "https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key"

- name: "Create preference files [{{ ansible_facts.os_family }}]"
  become: true
  ansible.builtin.copy:
    src: "nodejs.pref"
    dest: "/etc/apt/preferences.d/nodejs.pref"
    mode: "0644"

- name: "Update APT cache"
  become: true
  ansible.builtin.apt:
    update_cache: true
