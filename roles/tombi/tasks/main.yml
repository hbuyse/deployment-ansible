---
- name: "Tombi | Include OS specific variables"
  ansible.builtin.include_vars: "{{ item }}"
  with_first_found:
    - files:
        - "{{ ansible_os_family | lower }}.yml"
      skip: true
  tags: lsp

- name: "Tombi | Install from package manager"
  become: true
  when: tombi_package is defined
  ansible.builtin.package:
    name: "{{ tombi_package }}"
    state: present
  tags: lsp

- name: "Tombi | Install from Node Package Manager"
  become: true
  when: tombi_package is not defined
  community.general.npm:
    name: "{{ tombi_npm_package }}"
    global: true
    state: latest
    path: "/usr/local"
    production: true
    no_optional: true
  tags: lsp
